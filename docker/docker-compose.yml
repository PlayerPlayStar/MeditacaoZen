services:

# mysql
  mysql:
    image: mysql:8.0
    container_name: meditacao_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: meditacao_zen
      MYSQL_USER: meditacao_user
      MYSQL_PASSWORD: meditacao_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - meditacao_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # php/apache
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: meditacao_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ../logs:/var/www/html/logs
      - uploads_data:/var/www/html/uploads
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DATABASE=meditacao_zen
      - MYSQL_USER=meditacao_user
      - MYSQL_PASSWORD=meditacao_pass
    networks:
      - meditacao_network

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  meditacao_network:
    driver: bridge 